version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep '^JELLYBEAN_' >> .env.production || true
        - env | grep '^ADMIN_SECRET=' >> .env.production || true
    build:
      commands:
        - npm run test
        - npm run typecheck
        - npm run lint
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
